<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản E-Commerce</title>
</head>
<body>
    <h1>Đăng ký tài khoản</h1>
    <form action="#" method="POST">

        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <p>
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" 
                       required minlength="2" maxlength="50" 
                       placeholder="Nhập họ và tên">
            </p>

            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" 
                       required placeholder="example@gmail.com">
            </p>

            <p>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" 
                       pattern="[0-9]{10}" placeholder="Nhập 10 chữ số">
            </p>

            <p>
                <label for="dob">Ngày sinh:</label>
                <!-- Đã xóa placeholder ở đây để sửa lỗi Attribute placeholder is only allowed when... -->
                <input type="date" id="dob" name="dob" 
                       max="2026-05-14"> 
            </p>
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>

            <p>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" 
                       pattern="^[a-zA-Z0-9_]{3,20}$" 
                       placeholder="Chữ cái, số, underscore (3-20 ký tự)">
            </p>

            <p>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" 
                       minlength="8" 
                       pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" 
                       placeholder="Ít nhất 1 chữ hoa + 1 số">
            </p>

            <p>
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" 
                       placeholder="Nhập lại mật khẩu">
            </p>
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <p>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">--Chọn Tỉnh/Thành--</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </p>

            <p>
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district">
                    <option value="">--Để tĩnh--</option>
                </select>
            </p>

            <p>
                <label for="address">Địa chỉ chi tiết:</label><br>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea>
            </p>

            <p>
                Giới tính:
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Nam</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Nữ</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Khác</label>
            </p>
        </fieldset>

        <p>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">Tôi đồng ý với điều khoản dịch vụ</label>
        </p>

        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>

    </form>
</body>
</html>
