<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Lab</title>
    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>

    <h2>Phần 1: Chứng minh content-box vs border-box</h2>
    <div class="box-container">
        <div class="box box-1">Hộp 1 (content-box)</div>
        <div class="box box-2">Hộp 2 (border-box)</div>
    </div>

    <hr>

    <h2>Phần 2: Layout 3 cột (Sử dụng border-box)</h2>
    <div class="container">
        <div class="sidebar-left">Cột trái (250px)</div>
        <div class="content-middle">Cột giữa (500px)</div>
        <div class="sidebar-right">Cột phải (250px)</div>
    </div>

</body>
</html>
