<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Grid Layout E-Commerce</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="container">
        <header>HEADER</header>
        <section class="hero">HERO BANNER (Sản phẩm nổi bật)</section>
        
        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <ul>
                <li><input type="checkbox"> Điện tử</li>
                <li><input type="checkbox"> Thời trang</li>
                <li><input type="checkbox"> Gia dụng</li>
            </ul>
        </aside>

        <main>
            <div class="card">Sản phẩm 1</div>
            <div class="card">Sản phẩm 2</div>
            <div class="card">Sản phẩm 3</div>
            <div class="card">Sản phẩm 4</div>
            <div class="card">Sản phẩm 5</div>
            <div class="card">Sản phẩm 6</div>
        </main>

        <aside class="ads">ADS PLACEHOLDER</aside>
        <footer>FOOTER</footer>
    </div>
</body>
</html>
