<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Positioning Playground - Modern</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>
    <header>
        <div class="logo">TECH SHOP</div>
        <nav>Trang chủ | Sản phẩm | Liên hệ</nav>
    </header>

    <div class="main-wrapper">
        <aside>
            <h3>Danh mục sản phẩm</h3>
            <ul>
                <li>Đồ Điện tử</li>
                <li>Gia dụng thông minh</li>
                <li>Thiết bị văn phòng</li>
            </ul>
        </aside>

        <section class="content">
            <div class="product-card">
                <div class="hot-badge">HOT</div>
                <img src="https://picsum.photos/id/237/200/120" alt="Sản phẩm 1" class="card-img">
                <h3>Sản phẩm 1</h3>
            </div>
            <div class="product-card">
                <div class="hot-badge">HOT</div>
                <img src="https://picsum.photos/id/201/200/120" alt="Sản phẩm 2" class="card-img">
                <h3>Sản phẩm 2</h3>
            </div>
            <div class="product-card">
                <div class="hot-badge">HOT</div>
                <img src="https://picsum.photos/id/101/200/120" alt="Sản phẩm 3" class="card-img">
                <h3>Sản phẩm 3</h3>
            </div>
        </section>
    </div>

    <button class="scroll-top">↑</button>
</body>
</html>
