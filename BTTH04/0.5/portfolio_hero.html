<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Portfolio — Hero & Skills</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; }
        .hero { background: linear-gradient(135deg, #3498db, #2c3e50); color: white;
                text-align: center; padding: 3rem 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .hero h1 { font-size: 2rem; margin-bottom: 0.3rem; margin-top: 0; }
        .hero p { opacity: 0.85; margin-bottom: 1.5rem; }
        .hero button { padding: 10px 24px; background: #e74c3c; color: white;
                       border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .skills-container { text-align: center; }
        .skills-container h2 { margin-bottom: 1.5rem; color: #2c3e50; }
        .skills { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; }
        .skill-badge { padding: 6px 14px; border-radius: 20px; font-size: 14px;
                       color: white; display: inline-flex; align-items: center; gap: 6px; font-weight: bold; }
        .skill-badge .level { font-size: 11px; opacity: 0.8; font-weight: normal; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const skills = [
            { name: 'HTML5', level: 95, color: '#e34c26' },
            { name: 'CSS3', level: 90, color: '#264de4' },
            { name: 'JavaScript', level: 85, color: '#f0db4f' },
            { name: 'React', level: 70, color: '#61dafb' },
            { name: 'Node.js', level: 60, color: '#68a063' },
        ];

        // ============================================
        // TODO 1: Component PortfolioHero
        // ============================================
        function PortfolioHero({ name, title, buttonText }) {
            return (
                <div className="hero">
                    <h1>Xin chào, tôi là {name}</h1>
                    <p>{title}</p>
                    <button onClick={() => alert('Cảm ơn bạn đã quan tâm!')}>{buttonText}</button>
                </div>
            );
        }

        // ============================================
        // TODO 2: Component SkillBadge
        // ============================================
        function SkillBadge({ name, level, color }) {
            // Khởi tạo inline style động dựa trên thuộc tính color truyền vào từ props
            // Lưu ý đối với các thẻ text có màu nền sáng như JavaScript (#f0db4f), ta có thể chỉnh màu chữ tối hơn để dễ nhìn
            const badgeStyle = {
                backgroundColor: color,
                color: name === 'JavaScript' ? '#333' : '#fff'
            };

            return (
                <span className="skill-badge" style={badgeStyle}>
                    {name} <span className="level">({level}%)</span>
                </span>
            );
        }

        // ============================================
        // TODO 3: Component SkillsSection
        // ============================================
        function SkillsSection({ skills }) {
            return (
                <div className="skills-container">
                    <h2>Kỹ năng công nghệ</h2>
                    <div className="skills">
                        {/* Duyệt mảng dữ liệu skills và truyền tương ứng vào Component con */}
                        {skills.map((skill, index) => (
                            <SkillBadge 
                                key={index} 
                                name={skill.name} 
                                level={skill.level} 
                                color={skill.color} 
                            />
                        ))}
                    </div>
                </div>
            );
        }

        // ============================================
        // TODO 4: Component App — Compose tất cả
        // ============================================
        function App() {
            return (
                <div>
                    <PortfolioHero 
                        name="Nguyễn Văn Minh" 
                        title="Fullstack Web Developer Intern & UI/UX Designer" 
                        buttonText="Liên hệ với tôi" 
                    />
                    <SkillsSection skills={skills} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
